services:
  nginx:
    image: nginx:latest
    container_name: blogify_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./app/SSL:/etc/nginx/ssl
    depends_on:
      - php
    networks:
      - blognet

  php:
    build: ./docker/php
    container_name: blogify_php
    volumes:
      - .:/var/www
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - VITE_URL=http://localhost:5174
    networks:
      - blognet

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blogify
      MYSQL_USER: phpuser
      MYSQL_PASSWORD: root
    ports:
      - "3307:3306"
    networks:
      - blognet

  node:
    image: node:20
    container_name: blogify_node
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: sh -c "npm install && npm run dev"
    environment:
      - VITE_PORT=5173
      - VITE_HMR_HOST=localhost
      - VITE_HMR_PORT=5174
      - VITE_ORIGIN=http://localhost:5174
    ports:
      - "5174:5173"
    networks:
      - blognet

  dnsmasq:
    image: strm/dnsmasq
    container_name: blogify_dnsmasq
    privileged: true
    # Removed port 53 mapping to avoid conflict with host (systemd-resolved)
    volumes:
      - ./docker/dnsmasq/dnsmasq.conf:/etc/dnsmasq.conf
    networks:
      - blognet

networks:
  blognet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
