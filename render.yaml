services:
  - type: web
    name: blogify
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: singapore
    envVars:
      - key: PORT
        value: 80
      - key: DB_HOST
        fromDatabase:
          name: blogify-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: blogify-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: blogify-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: blogify-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: blogify-db
          property: password
    # Explicitly clear any dashboard overrides
    startCommand: null
    # Run migrations before starting the new version
    releaseCommand: php migrate.php && php seed_categories.php

databases:
  - name: blogify-db
    databaseName: blogify
    user: blogify_user
    plan: free
    region: singapore
